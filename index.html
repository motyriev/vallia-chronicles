<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семейное древо — Бестиарий</title>
<style>
:root{
  --ink:#0e0b08;
  --panel:#171209;
  --panel2:#1e1810;
  --gold:#c59a4f;
  --gold-hi:#ecd39b;
  --gold-dim:#8a6c39;
  --parch:#ddd1ba;
  --muted:#9a8b72;
  --blood:#8c2f26;
  --line:rgba(197,154,79,.30);
  --line-soft:rgba(197,154,79,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
body{
  background:var(--ink);
  color:var(--parch);
  font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,"Times New Roman",serif;
  font-size:17px;line-height:1.65;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 90% 50% at 50% -10%, rgba(197,154,79,.07), transparent),
    radial-gradient(ellipse 70% 40% at 50% 115%, rgba(140,47,38,.05), transparent),
    radial-gradient(circle 340px at 12% 28%, rgba(197,154,79,.028), transparent),
    radial-gradient(circle 280px at 88% 55%, rgba(197,154,79,.022), transparent),
    radial-gradient(circle 380px at 42% 82%, rgba(122,92,52,.03), transparent),
    radial-gradient(circle 220px at 70% 15%, rgba(140,47,38,.02), transparent);
}
.wrap{max-width:820px;margin:0 auto;padding:0 18px 90px}
a{color:var(--gold-hi);text-decoration:none}
a:hover{color:#fff}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:2px}

/* ── шапка ── */
header.site{
  text-align:center;padding:34px 10px 20px;
  border-bottom:1px solid var(--line-soft);
  margin-bottom:26px;position:relative;
}
header.site::after{
  content:"✦";color:var(--gold);position:absolute;left:50%;bottom:-11px;
  transform:translateX(-50%);background:var(--ink);padding:0 14px;font-size:13px;
}
.site h1{
  font-size:clamp(18px,4.6vw,28px);font-weight:400;letter-spacing:.26em;
  text-transform:uppercase;color:var(--gold-hi);cursor:pointer;padding-left:.26em;
}
.site h1 span{color:var(--gold)}
.site .tag{
  margin-top:6px;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);
}

/* ── панель разделов ── */
.topnav{
  position:sticky;top:0;z-index:10;background:rgba(14,11,8,.95);
  border-bottom:1px solid var(--line-soft);margin:0 -18px 24px;padding:0 10px;
  display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
}
.topnav::-webkit-scrollbar{display:none}
.topnav{-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.topnav a{scroll-snap-align:center}
.topnav a{
  padding:12px 12px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;
}
.topnav a:first-child{margin-left:auto}
.topnav a:last-child{margin-right:auto}
.topnav .ic{margin-right:7px;color:var(--gold-dim);letter-spacing:0}
.topnav a.on .ic{color:var(--gold)}
.topnav a.on{color:var(--gold-hi);box-shadow:inset 0 -2px 0 var(--gold)}
.topnav a:hover{color:var(--gold-hi)}

/* ── путь и кнопка назад ── */
.pagebar{display:flex;align-items:center;gap:14px;margin:2px 0 20px;flex-wrap:wrap}
.back-btn{
  border:1px solid var(--line);background:var(--panel);color:var(--gold-hi);
  font:inherit;font-size:13.5px;padding:6px 14px;cursor:pointer;letter-spacing:.05em;
  flex-shrink:0;
}
.back-btn:hover,.back-btn:focus-visible{border-color:var(--gold)}
.crumbs{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-width:0}
.crumbs a{color:var(--gold)}
.crumbs .sep{color:var(--gold-dim)}
.crumbs .cur{color:var(--muted)}

/* ── поиск ── */
.search{margin:0 0 26px}
.search input{
  width:100%;background:var(--panel);border:1px solid var(--line);
  color:var(--parch);font:inherit;font-size:16px;padding:11px 16px;
  border-radius:2px;
}
.search input::placeholder{color:var(--muted);font-style:italic}
.search input:focus{outline:none;border-color:var(--gold)}

/* ── сетка разделов ── */
.sections{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.sec-card{
  display:block;background:var(--panel);border:1px solid var(--line);
  padding:20px 20px 16px;position:relative;transition:border-color .18s,background .18s;
}
.sec-card:hover{border-color:var(--gold);background:var(--panel2);color:inherit}
.sec-card::before,.sec-card::after{
  content:"";position:absolute;width:9px;height:9px;border:1px solid var(--gold-dim);
}
.sec-card::before{top:4px;left:4px;border-right:none;border-bottom:none}
.sec-card::after{bottom:4px;right:4px;border-left:none;border-top:none}
.sec-card h2{font-size:19px;font-weight:400;letter-spacing:.05em;color:var(--gold-hi)}
.sec-card h2 .ic{color:var(--gold-dim);margin-right:9px;letter-spacing:0}
.sec-card:hover h2 .ic{color:var(--gold)}
.list-title .ic{color:var(--gold-dim);margin-right:12px;letter-spacing:0}
.sec-card p{font-size:13.5px;color:var(--muted);margin-top:4px;line-height:1.45}
.sec-card .count{
  margin-top:12px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-dim);
}

/* ── список записей ── */
.list-title{
  font-size:clamp(17px,4.4vw,23px);font-weight:400;color:var(--gold-hi);
  letter-spacing:.2em;text-transform:uppercase;text-align:center;
  margin-bottom:4px;padding-left:.2em;
}
.list-sub{color:var(--muted);font-size:14.5px;font-style:italic;margin-bottom:24px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:14px}
.card{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  background:var(--panel);border:1px solid var(--line-soft);
  padding:24px 14px 20px;color:inherit;position:relative;
  transition:border-color .18s,background .18s;
}
.card:hover{border-color:var(--gold);background:var(--panel2);color:inherit}
.card::before,.card::after{
  content:"";position:absolute;width:9px;height:9px;border:1px solid var(--gold-dim);
}
.card::before{top:4px;left:4px;border-right:none;border-bottom:none}
.card::after{bottom:4px;right:4px;border-left:none;border-top:none}
.card .m-wrap{margin:6px auto 16px}
.card .r-sec{font-size:10px;color:var(--gold-dim);letter-spacing:.22em;text-transform:uppercase;margin-bottom:5px}
.card .c-title{font-size:16.5px;color:var(--gold-hi);letter-spacing:.02em;line-height:1.35}
.card .c-years{font-size:12px;color:var(--gold);letter-spacing:.14em;margin-top:5px}
.card .c-sub{
  font-size:13px;color:var(--muted);line-height:1.45;margin-top:7px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

/* ── медальоны ── */
.medallion{
  border:1px solid var(--gold);
  border-radius:50%;
  overflow:hidden;background:var(--panel2);
  box-shadow:0 0 0 3px var(--ink), 0 0 0 4px var(--gold-dim), inset 0 0 26px rgba(0,0,0,.55);
  position:relative;flex-shrink:0;
}
.medallion img,.medallion svg{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.medallion .ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--gold-dim);font-size:26px;
}
.m-wrap{position:relative;flex-shrink:0}
.m-wrap::before{
  content:"";position:absolute;inset:-10px;border:1px dotted rgba(197,154,79,.55);
  border-radius:50%;pointer-events:none;
}
.m-wrap .pt{position:absolute;width:6px;height:6px;background:var(--gold);transform:rotate(45deg)}
.m-wrap .pt.n{top:-13px;left:50%;margin-left:-3px}
.m-wrap .pt.s{bottom:-13px;left:50%;margin-left:-3px}
.m-wrap .pt.w{left:-13px;top:50%;margin-top:-3px}
.m-wrap .pt.e{right:-13px;top:50%;margin-top:-3px}

/* ── карточка-досье ── */
.dossier{
  background:var(--panel);border:1px solid var(--gold-dim);padding:0;position:relative;
  box-shadow:inset 0 0 0 5px var(--panel), inset 0 0 0 6px rgba(197,154,79,.35);
}
.dossier .fleur{
  position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:var(--ink);padding:0 12px;color:var(--gold);font-size:12px;letter-spacing:.4em;
}
.dossier::before,.dossier::after,
.dossier .c3::before,.dossier .c3::after{
  content:"";position:absolute;width:12px;height:12px;border:1px solid var(--gold);
}
.dossier::before{top:5px;left:5px;border-right:none;border-bottom:none}
.dossier::after{top:5px;right:5px;border-left:none;border-bottom:none}
.dossier .c3::before{bottom:5px;left:5px;border-right:none;border-top:none}
.dossier .c3::after{bottom:5px;right:5px;border-left:none;border-top:none}
.d-head{
  display:flex;gap:30px;padding:36px 32px 26px;align-items:flex-start;
  border-bottom:1px solid var(--line-soft);
}
.d-head .m-wrap{margin:4px 0 0 4px}
.d-id h2{font-size:clamp(22px,5vw,30px);font-weight:400;color:var(--gold-hi);
  line-height:1.2;letter-spacing:.03em}
.d-id .years{
  margin-top:8px;color:var(--gold);font-size:15px;letter-spacing:.16em;
}
.d-id .sub{margin-top:6px;color:var(--muted);font-style:italic;font-size:15.5px;line-height:1.45}
.d-id .sec-label{
  font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-dim);
  margin-bottom:8px;
}
.d-body{padding:24px 30px 30px}
.d-body p{margin-bottom:14px;text-align:justify;hyphens:auto}
.d-body p:last-child{margin-bottom:0}

.epigraph{
  margin:0 0 22px;padding:14px 18px;border-left:2px solid var(--gold-dim);
  color:var(--gold-hi);font-style:italic;font-size:16px;line-height:1.6;
  background:rgba(197,154,79,.04);
}
.epigraph .src{display:block;margin-top:6px;color:var(--muted);font-size:13px;font-style:normal;letter-spacing:.06em}

/* ── блоки на карточке ── */
.block{margin-top:26px;padding-top:18px;border-top:1px solid var(--line-soft);position:relative}
.block::before{
  content:"✦";position:absolute;top:-9px;left:0;color:var(--gold-dim);
  background:var(--panel);padding-right:10px;font-size:11px;
}
.block h3{
  font-size:12px;font-weight:400;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}
.versions .v-item{margin-bottom:14px}
.versions .v-topic{color:var(--gold-hi);font-style:italic;margin-bottom:8px;font-size:15.5px}
.versions .v-read{
  padding:9px 14px;border:1px solid var(--line-soft);margin-bottom:7px;
  font-size:15px;color:var(--parch);background:rgba(0,0,0,.18);
}
.versions .v-read b{
  color:#c05e50;font-weight:400;font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;display:block;margin-bottom:3px;
}
.notes p{
  font-size:14.5px;color:var(--muted);font-style:italic;margin-bottom:8px;
  padding-left:18px;position:relative;text-align:left;
}
.notes p::before{content:"※";position:absolute;left:0;color:var(--gold-dim);font-style:normal}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  display:inline-block;border:1px solid var(--line);background:var(--panel2);
  padding:7px 13px 8px;font-size:14px;color:var(--gold-hi);line-height:1.35;
  transition:border-color .15s;max-width:100%;
}
.chip:hover{border-color:var(--gold);color:#fff}
.chip .rel{display:block;font-size:11px;color:var(--muted);letter-spacing:.05em}
.chip .y{color:#c05e50;font-size:12px;margin-left:6px;letter-spacing:.06em}

/* ── хроника ── */
.tl{position:relative;margin-left:12px;padding-left:32px;border-left:1px solid var(--line)}
.tl-item{position:relative;margin-bottom:30px}
.tl-item::before{
  content:"";position:absolute;left:-37px;top:19px;width:9px;height:9px;
  background:var(--gold);transform:rotate(45deg);
}
.tl-item::after{
  content:"";position:absolute;left:-43px;top:13px;width:19px;height:19px;
  border:1px solid var(--gold-dim);border-radius:50%;background:var(--ink);z-index:-1;
}
.tl-year{
  font-size:21px;letter-spacing:.08em;color:var(--gold-hi);margin-bottom:3px;
}
.tl-year::after{content:"  —";color:var(--gold-dim)}
.tl-card{
  display:block;padding:8px 12px 10px;margin-left:-12px;color:inherit;
  border:1px solid var(--line-soft);background:rgba(23,18,9,.45);
  transition:border-color .15s;
}
.tl-card:hover,.tl-card:active{border-color:var(--gold);background:var(--panel)}
.tl-card .t{
  color:var(--gold);font-size:13.5px;letter-spacing:.18em;text-transform:uppercase;line-height:1.6;
}
.tl-card .t::after{content:"  ›";color:var(--gold-dim)}
.tl-card:hover .t{color:#fff}
.tl-card .d{color:var(--muted);font-size:14.5px;margin-top:5px;line-height:1.5}
.tl-rose{margin:0 0 18px -47px;line-height:0}
.tl-rose.end{margin:10px 0 0 -47px}
.tl-note{
  margin:0 0 24px;padding:12px 16px;border:1px dashed var(--line);
  color:var(--muted);font-style:italic;font-size:14.5px;
}
.tl-undated{
  margin:30px 0 16px;font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-dim);
  text-align:center;
}
.d-img-wide{margin:0 0 20px;border:1px solid var(--gold-dim);padding:4px;background:var(--ink)}
.d-img-wide img{width:100%;display:block}

/* ── подвал ── */
footer{
  margin-top:60px;text-align:center;color:var(--muted);font-size:12.5px;
  letter-spacing:.18em;text-transform:uppercase;
}
footer::before{content:"✦ ✦ ✦";display:block;color:var(--gold-dim);margin-bottom:10px;letter-spacing:.6em}
footer a{color:var(--gold);border-bottom:1px solid transparent}
footer a:hover{color:var(--gold-hi);border-bottom-color:var(--gold-dim)}

.empty{color:var(--muted);font-style:italic;padding:20px 0}

/* ── режим летописца ── */
.adm label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-top:12px}
.adm input,.adm textarea,.adm select{
  width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--parch);
  font:inherit;font-size:14.5px;padding:8px 11px;margin-top:5px;border-radius:2px;
}
.adm input:focus,.adm textarea:focus,.adm select:focus{outline:none;border-color:var(--gold)}
.adm textarea{min-height:96px;resize:vertical}
.adm .hint{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic}
.btn{
  display:inline-block;border:1px solid var(--gold-dim);background:var(--panel);
  color:var(--gold-hi);font:inherit;font-size:13.5px;padding:8px 16px;cursor:pointer;
  letter-spacing:.06em;margin:14px 8px 0 0;
}
.btn:hover{border-color:var(--gold)}
.btn.danger{color:#c05e50;border-color:rgba(140,47,38,.5)}
.btn.danger:hover{border-color:var(--blood)}
.adm-set{border:1px solid var(--line-soft);background:var(--panel);padding:14px 16px;margin-bottom:22px}
.adm-set summary{cursor:pointer;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-size:12.5px}
.adm-rows a{display:flex;justify-content:space-between;gap:10px;padding:9px 12px;border:1px solid var(--line-soft);margin-bottom:6px;color:var(--gold-hi);font-size:15px}
.adm-rows a:hover{border-color:var(--gold)}
.adm-rows .sec-h{margin:18px 0 8px;font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-dim)}
#admin-status{margin-top:14px;padding:10px 14px;border:1px dashed var(--line);color:var(--parch);font-size:14px;min-height:20px}
.adm-flag{color:#c05e50;font-size:13px;font-style:italic;margin-bottom:14px}
#preview-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  display:flex;align-items:center;justify-content:center;gap:16px;
  background:rgba(20,12,8,.97);border-top:1px solid var(--blood);
  padding:10px 14px;font-size:13.5px;color:var(--gold-hi);letter-spacing:.04em;
}
#preview-bar button{
  border:1px solid var(--gold-dim);background:var(--panel);color:var(--gold-hi);
  font:inherit;font-size:13px;padding:5px 14px;cursor:pointer;
}
#preview-bar button:hover{border-color:var(--gold)}
.adm-link{opacity:.55;margin-left:10px}
.adm-link:hover{opacity:1}

/* ── мобильная вёрстка ── */
@media (max-width:620px){
  body{font-size:16px}
  .wrap{padding:0 12px 70px}
  .topnav{
    margin:0 -12px 20px;padding:0 2px;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 16px,#000 calc(100% - 16px),transparent);
    mask-image:linear-gradient(90deg,transparent,#000 16px,#000 calc(100% - 16px),transparent);
  }
  .topnav a{padding:13px 9px;font-size:11px;letter-spacing:.09em}
  .topnav .ic{margin-right:5px}
  .d-head{flex-direction:column;align-items:center;text-align:center;padding:32px 18px 22px}
  .d-head .m-wrap{margin:4px 0 0}
  .d-id .sec-label{margin-top:16px}
  .d-body{padding:20px 18px 26px}
  .d-body p{text-align:left}
  .sections{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .card{padding:18px 10px 16px}
  .card .c-title{font-size:15px}
  .card .m-wrap{transform:scale(.88);margin:2px auto 8px}
  .tl{margin-left:6px;padding-left:24px}
  .tl-rose{margin-left:-39px}
  .tl-rose.end{margin-left:-39px}
  .tl-item::before{left:-29px}
  .tl-item::after{left:-35px}
  .tl-year{font-size:19px}
}
@media (max-width:420px){
  .sections{grid-template-columns:1fr}
}
</style>
</head>

    "С юности он ушёл туда, куда редко заглядывали даже мудрецы его времени, — в биологию, анатомию, химию и алхимию. Среди формул он искал не богов, а порядок; не веру — а объяснение. Современники описывали его противоречиво: гордый, язвительный и замкнутый, но способный к редкой мягкости. Он не стремился быть любимым — он стремился быть понятым.",
    "Он не был великим стратегом в классическом смысле, но умел читать людей — словно их мысли оставляли следы на бумаге. Он давал приют, обучал детей, завоёвывал доверие и уважение одновременно, оставаясь для одних спасителем, для других — угрозой.",
    "После смерти родителей власть должна была перейти старшему брату, но в 1308 году интриги, договоры и кровь привели Дагара к единоличному правлению. Семь подземных лабораторий стали его тихой крепостью: там рождалось оружие, которое должно было изменить саму логику войны. Он понимал, что численность его армии проигрывает, если качество не доведено до предела.",

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   ДВИЖОК БЕСТИАРИЯ
   Все данные лежат выше, в блоке <script id="bestiary-data"> —
   их можно править в любом текстовом редакторе, не трогая код.
   Изображения — в блоке #bestiary-images (ключ → base64).
   ═══════════════════════════════════════════════════════════════ */

const PUB_DATA = JSON.parse(document.getElementById("bestiary-data").textContent);
const PUB_IMGS = JSON.parse(document.getElementById("bestiary-images").textContent);
let DATA = PUB_DATA;
let IMGS = PUB_IMGS;
const app  = document.getElementById("app");

let byId = {}, inbound = {};
function rebuildIndex(){
  byId = {}; inbound = {};
  DATA.entries.forEach(e => byId[e.id] = e);
  /* обратные упоминания: кто ссылается на запись */
  DATA.entries.forEach(e => (e.links||[]).forEach(l => {
    (inbound[l.to] = inbound[l.to] || []).push(e.id);
  }));
}
rebuildIndex();

const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* иконки разделов (текстовые глифы, \uFE0E запрещает эмодзи-отрисовку) */
const ICONS = {
  "":          "✦",
  "factions":  "♛\uFE0E",
  "characters":"♟\uFE0E",
  "orders":    "✠",
  "locations": "♜\uFE0E",
  "heraldry":  "❖",
  "chronicle": "✎\uFE0E"
};

/* склонение: 1 запись, 4 записи, 18 записей */
function plural(n, one, few, many){
  const m100 = n % 100, m10 = n % 10;
  if (m100 >= 11 && m100 <= 14) return many;
  if (m10 === 1) return one;
  if (m10 >= 2 && m10 <= 4) return few;
  return many;
}

/* ── эмблема культа (SVG, воспроизведена по описанию) ── */
function cultSVG(){
  return `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Знак культа">
    <rect width="100" height="120" fill="#100c08"/>
    <circle cx="50" cy="60" r="34" fill="none" stroke="#8a6c39" stroke-width="1.5"/>
    <circle cx="50" cy="60" r="30" fill="none" stroke="#c59a4f" stroke-width=".8" opacity=".6"/>
    <ellipse cx="50" cy="60" rx="17" ry="13" fill="none" stroke="#a13327" stroke-width="3"/>
    <g stroke="#c8402f" stroke-width="3.4" stroke-linecap="round">
      <line x1="50" y1="52" x2="50" y2="68"/>
      <line x1="42" y1="60" x2="58" y2="60"/>
    </g>
    <g fill="#7e2a24" opacity=".85">
      <circle cx="50" cy="21" r="1.6"/><circle cx="50" cy="99" r="1.6"/>
      <circle cx="12" cy="60" r="1.6"/><circle cx="88" cy="60" r="1.6"/>
    </g>
  </svg>`;
}

function medallion(entry, size, deco){
  let inner;
  if (entry.image === "svg:cult") inner = cultSVG();
  else if (entry.image && IMGS[entry.image]) inner = `<img src="${IMGS[entry.image]}" alt="${esc(entry.title)}" loading="lazy">`;
  else inner = `<div class="ph">✦</div>`;
  const core = `<div class="medallion" style="width:${size}px;height:${size}px">${inner}</div>`;
  if (!deco) return core;
  return `<div class="m-wrap" style="width:${size}px;height:${size}px">${core}
    <i class="pt n"></i><i class="pt s"></i><i class="pt w"></i><i class="pt e"></i></div>`;
}

/* роза ветров для хроники */
function roseSVG(cls){
  return `<div class="tl-rose ${cls||""}"><svg width="30" height="30" viewBox="0 0 40 40" aria-hidden="true">
    <circle cx="20" cy="20" r="19" fill="#0e0b08"/>
    <circle cx="20" cy="20" r="13" fill="none" stroke="#8a6c39" stroke-width="1"/>
    <circle cx="20" cy="20" r="3" fill="none" stroke="#c59a4f" stroke-width="1"/>
    <g fill="#8a6c39" transform="rotate(45 20 20)">
      <path d="M20 6 21.5 18.5 20 20 18.5 18.5Z"/><path d="M20 34 21.5 21.5 20 20 18.5 21.5Z"/>
      <path d="M6 20 18.5 18.5 20 20 18.5 21.5Z"/><path d="M34 20 21.5 18.5 20 20 21.5 21.5Z"/>
    </g>
    <g fill="#c59a4f">
      <path d="M20 1 22.4 17.6 20 20 17.6 17.6Z"/><path d="M20 39 22.4 22.4 20 20 17.6 22.4Z"/>

const nav = document.getElementById("topnav");

function setNav(secId){
  nav.querySelectorAll("a").forEach(a => a.classList.toggle("on", a.dataset.nav === (secId||"")));

/* назад по истории браузера; если истории нет — в раздел записи */
window.goBack = function(secId){
  if (history.length > 1) history.back();
  else go("#/s/" + secId);
};

function crumbs(parts){
  /* parts: [{href, label}] — последний элемент без href становится текущим */
  return `<div class="crumbs">` + parts.map((p,i) => {
    const sep = i ? `<span class="sep">›</span>` : "";
    return sep + (p.href ? `<a href="${p.href}">${esc(p.label)}</a>` : `<span class="cur">${esc(p.label)}</span>`);
  }).join("") + `</div>`;
}

function render(){
  const h = location.hash || "#/";
  window.scrollTo(0,0);
  if (h.startsWith("#/setup")) return adminSetup(h);
  if (h === "#/admin" || h.startsWith("#/admin/")) { setNav("§none§"); return renderAdmin(h); }
  if (h.startsWith("#/s/"))      renderSection(h.slice(4));
  else if (h.startsWith("#/e/")) renderEntry(h.slice(4));
  else                           renderHome();
}

/* ── главный экран ── */
let lastQuery = "";
function renderHome(){
  setNav("");
  const counts = {};
  DATA.entries.forEach(e => counts[e.section] = (counts[e.section]||0)+1);
  app.innerHTML = `
    <div class="search"><input id="q" type="search" placeholder="Поиск по летописям — имя, место, орден…" autocomplete="off"></div>
    <div id="home-body"></div>`;
  const q = document.getElementById("q");
  const body = document.getElementById("home-body");
  const show = () => {
    const v = q.value.trim().toLowerCase();
    lastQuery = q.value;
    body.innerHTML = v ? searchResults(v) : sectionsGrid(counts);
  };
  q.value = lastQuery;   /* запрос переживает уход со страницы */
  show();
  q.addEventListener("input", show);
}

function sectionsGrid(counts){
  return `<div class="sections">` + DATA.sections.map(s => {
    const n = counts[s.id] || 0;
    return `
    <a class="sec-card" href="#/s/${s.id}">
      <h2><span class="ic">${ICONS[s.id]||"✦"}</span>${esc(s.title)}</h2>
      <p>${esc(s.sub)}</p>
      <div class="count">${n} ${plural(n, "запись", "записи", "записей")}</div>
    </a>`;
  }).join("") + `</div>`;
}

function searchResults(v){
  const found = DATA.entries.filter(e => {
    const hay = [e.title, e.sub||"", e.years||"", (e.body||[]).join(" ")].join(" ").toLowerCase();
    return hay.includes(v);
  });
  if (!found.length) return `<p class="empty">Летописи молчат — по запросу ничего не найдено.</p>`;
  return `<div class="grid">` + found.map(e => rowHTML(e, true)).join("") + `</div>`;
}

/* ── раздел ── */
function renderSection(id){
  const sec = DATA.sections.find(s => s.id === id);
  if (!sec) return renderHome();
  setNav(id);
  const items = DATA.entries.filter(e => e.section === id);
  let bodyHTML;
  if (id === "chronicle") bodyHTML = timelineHTML(items);
  else bodyHTML = `<div class="grid">` + items.map(e => rowHTML(e)).join("") + `</div>`;
  app.innerHTML = `
    <div class="pagebar">${crumbs([{href:"#/",label:"Архив"},{label:sec.title}])}</div>
    <h2 class="list-title"><span class="ic">${ICONS[sec.id]||"✦"}</span>${esc(sec.title)}</h2>
    <p class="list-sub">${esc(sec.sub)}</p>
    ${bodyHTML}`;
}

function rowHTML(e, withSec){
  const secTitle = withSec ? (DATA.sections.find(s => s.id === e.section)||{}).title : null;
  return `<a class="card" href="#/e/${e.id}">
    ${medallion(e,96,true)}
    ${secTitle ? `<div class="r-sec">${esc(secTitle)}</div>` : ""}
    <div class="c-title">${esc(e.title)}</div>
    ${e.years ? `<div class="c-years">${esc(e.years)}</div>` : ""}
    ${e.sub ? `<div class="c-sub">${esc(e.sub)}</div>` : ""}
  </a>`;
}

function timelineHTML(items){
  const dated = items.filter(e => e.yearSort != null).sort((a,b) => a.yearSort - b.yearSort);
  const undated = items.filter(e => e.yearSort == null);
  const one = e => `
    <div class="tl-item">
      <div class="tl-year">${esc(e.yearLabel || e.years || "")}</div>
      <a class="tl-card" href="#/e/${e.id}">
        <div class="t">${esc(e.title)}</div>
        ${e.sub ? `<div class="d">${esc(e.sub)}</div>` : ""}
      </a>
    </div>`;
  let out = `<div class="tl">` + roseSVG("") + dated.map(one).join("") + roseSVG("end") + `</div>`;
  if (undated.length){
    out += `<div class="tl-undated">Летописи дат не сохранили</div>`;
    out += `<div class="tl">` + undated.map(one).join("") + `</div>`;
  }
  return out;
}

/* ── карточка-досье ── */
function renderEntry(id){
  const e = byId[id];
  if (!e) return renderHome();
  setNav(e.section);
  const sec = DATA.sections.find(s => s.id === e.section) || {title:""};

  const epigraph = e.epigraph ? `
    <div class="epigraph">«${esc(e.epigraph.t)}»
      ${e.epigraph.s ? `<span class="src">— ${esc(e.epigraph.s)}</span>` : ""}
    </div>` : "";

  const wideImg = (e.section === "chronicle" && e.image && IMGS[e.image])
    ? `<div class="d-img-wide"><img src="${IMGS[e.image]}" alt="${esc(e.title)}"></div>` : "";

  const body = (e.body||[]).map(p => `<p>${esc(p).replace(/\n/g,"<br>")}</p>`).join("");

  const versions = (e.versions && e.versions.length) ? `
    <div class="block versions"><h3>Редакции летописи</h3>
      ${e.versions.map(v => `
        <div class="v-item">
          <div class="v-topic">${esc(v.topic)}</div>
          ${v.readings.map((r,i) => `<div class="v-read"><b>Редакция ${["I","II","III","IV"][i]||i+1}</b>${esc(r)}</div>`).join("")}
        </div>`).join("")}
    </div>` : "";

  const notes = (e.notes && e.notes.length) ? `
    <div class="block notes"><h3>Пометки летописца</h3>
      ${e.notes.map(n => `<p>${esc(n)}</p>`).join("")}
    </div>` : "";

  const chip = (targetId, rel) => {
    const t = byId[targetId];
    if (!t) return "";
    return `<a class="chip" href="#/e/${t.id}">${esc(t.title)}${t.years ? `<span class="y">${esc(t.years)}</span>` : ""}${rel ? `<span class="rel">${esc(rel)}</span>` : ""}</a>`;
  };

  const links = (e.links && e.links.length) ? `
    <div class="block"><h3>Связи</h3>
      <div class="chips">${e.links.map(l => chip(l.to, l.rel)).join("")}</div>
    </div>` : "";

  /* события, где запись — участник */
  const evs = DATA.entries.filter(x => x.section === "chronicle" && (x.participants||[]).includes(e.id));
  const chron = evs.length ? `
    <div class="block"><h3>В хронике</h3>
      <div class="chips">${evs.map(x => chip(x.id, x.yearLabel || "")).join("")}</div>
    </div>` : "";

  /* участники события */
  const parts = (e.participants && e.participants.length) ? `
    <div class="block"><h3>Действующие лица и стороны</h3>
      <div class="chips">${e.participants.map(pid => chip(pid,"")).join("")}</div>
    </div>` : "";

  /* обратные упоминания (без дублей с прямыми связями) */
  const direct = new Set((e.links||[]).map(l => l.to));
  const inb = (inbound[e.id]||[]).filter(x => !direct.has(x) && x !== e.id);
  const inbHTML = inb.length ? `
    <div class="block"><h3>Упоминается в записях</h3>
      <div class="chips">${[...new Set(inb)].map(x => chip(x,"")).join("")}</div>
    </div>` : "";

  app.innerHTML = `
    <div class="pagebar">
      <button class="back-btn" onclick="goBack('${e.section}')">‹ Назад</button>
      ${crumbs([{href:"#/",label:"Архив"},{href:"#/s/"+e.section,label:sec.title},{label:e.title}])}
    </div>
    <article class="dossier"><div class="c3">
      <div class="fleur">✦</div>
      <div class="d-head">
        ${e.section === "chronicle" ? "" : medallion(e,168,true)}
        <div class="d-id">
          <div class="sec-label">${esc(sec.title)}</div>
          <h2>${esc(e.title)}</h2>
          ${e.years ? `<div class="years">${esc(e.years)}</div>` : ""}
          ${e.sub ? `<div class="sub">${esc(e.sub)}</div>` : ""}
        </div>
      </div>
      <div class="d-body">
        ${wideImg}
        ${epigraph}
        ${body}
        ${versions}
        ${notes}
        ${parts}
        ${links}
        ${chron}
        ${inbHTML}
      </div>
    </div></article>`;
}

/* ═══════════════════════════════════════════════════════════════
   РЕЖИМ ЛЕТОПИСЦА — правка записей прямо в браузере.
   Черновик хранится в localStorage; публикация коммитит index.html
   в ваш репозиторий через GitHub API (нужен токен с правом contents:write).
   ═══════════════════════════════════════════════════════════════ */
const LS = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};
const clone = o => (typeof structuredClone === "function") ? structuredClone(o) : JSON.parse(JSON.stringify(o));
let DRAFT = null;
function draftInit(){
  if (DRAFT) return;
  const saved = LS.get("fd-draft");
  if (saved){ try{ DRAFT = JSON.parse(saved); }catch(e){ DRAFT = null; } }
  if (!DRAFT || !DRAFT.data) DRAFT = { data: clone(DATA), imgs: {} };
}
function draftSave(){ LS.set("fd-draft", JSON.stringify(DRAFT)); }
function draftDirty(){ return JSON.stringify(DRAFT.data) !== JSON.stringify(PUB_DATA) || Object.keys(DRAFT.imgs).length > 0; }
window.draftReset = function(){
  if (!confirm("Сбросить черновик к опубликованной версии?")) return;
  DRAFT = { data: clone(DATA), imgs: {} }; draftSave(); renderAdmin("#/admin");
};
function adminMsg(m){ const el = document.getElementById("admin-status"); if (el) el.textContent = m; }

function ghRead(){
  return {
    owner:  (document.getElementById("gh-owner")||{}).value ?? LS.get("fd-gh-owner") ?? "",
    repo:   (document.getElementById("gh-repo")||{}).value ?? LS.get("fd-gh-repo") ?? "",
    branch: (document.getElementById("gh-branch")||{}).value || LS.get("fd-gh-branch") || "main",
    path:   (document.getElementById("gh-path")||{}).value || LS.get("fd-gh-path") || "index.html",
    token:  (document.getElementById("gh-token")||{}).value ?? LS.get("fd-gh-token") ?? ""
  };
}
window.adminCfgSave = function(){
  const c = ghRead();
  LS.set("fd-gh-owner", c.owner); LS.set("fd-gh-repo", c.repo);
  LS.set("fd-gh-branch", c.branch); LS.set("fd-gh-path", c.path); LS.set("fd-gh-token", c.token);
};

/* ── настройка доступа по ссылке (для тех, кто не знает про GitHub) ── */
function adminSetup(h){
  const q = h.split("?")[1] || "";
  const p = new URLSearchParams(q);
  ["owner","repo","branch","path","token"].forEach(k => {
    const v = p.get(k);
    if (v) LS.set("fd-gh-" + k, v);
  });
  /* подчищаю токен из адресной строки и истории */
  history.replaceState(null, "", location.pathname + "#/admin");
  admEntryShow();
  render();
}
function admEntryShow(){
  const a = document.getElementById("adm-entry");
  if (a && LS.get("fd-gh-token")) a.style.display = "";
}
window.adminSetupLink = function(){
  adminCfgSave();
  const c = ghRead();
  if (!(c.owner && c.repo && c.token)) return adminMsg("Сначала заполните владельца, репозиторий и токен.");
  const url = location.origin + location.pathname + "#/setup?" +
    new URLSearchParams({ owner: c.owner, repo: c.repo, branch: c.branch, path: c.path, token: c.token });
  const done = () => adminMsg("✦ Ссылка скопирована. Отправьте ей в личных сообщениях, попросите открыть один раз — и удалите ссылку из переписки: в ней токен.");
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(url).then(done, () => adminMsg(url));
  else adminMsg(url);
};

function renderAdmin(h){

    return `<div class="sec-h">${ICONS[s.id]||"✦"} ${esc(s.title)} — ${items.length}</div>` +

  }).join("");
  const cfgOk = !!(c.owner && c.repo && c.token);
  app.innerHTML = `
    <div class="pagebar">${crumbs([{href:"#/",label:"Архив"},{label:"Режим летописца"}])}</div>
    <h2 class="list-title">✎ Режим летописца</h2>

    <div class="adm">
      ${cfgOk ? `<div class="hint" id="gh-hidden-note" style="margin-bottom:10px">Публикация настроена — кнопка «Опубликовать» отправит правки на сайт. <a href="#" onclick="var d=document.getElementById('gh-set');d.style.display='';d.open=true;document.getElementById('gh-hidden-note').style.display='none';return false">Показать настройки</a></div>` : ""}
      <details class="adm-set" id="gh-set" ${cfgOk ? `style="display:none"` : "open"}>
        <summary>Публикация на GitHub</summary>
        <label>Владелец (owner)</label><input id="gh-owner" value="${esc(c.owner)}" oninput="adminCfgSave()" autocomplete="off">
        <label>Репозиторий</label><input id="gh-repo" value="${esc(c.repo)}" oninput="adminCfgSave()" autocomplete="off">

        <label>Токен (fine-grained, право contents: write на этот репозиторий)</label>
        <input id="gh-token" type="password" value="${esc(c.token)}" oninput="adminCfgSave()" autocomplete="off">
        <label>Сообщение коммита</label><input id="gh-msg" value="обновление летописей" autocomplete="off">
        <div class="hint">Токен хранится только в этом браузере — в страницу и репозиторий он не попадает. Кнопка ниже соберёт ссылку-настройку: человек открывает её один раз, доступ сохраняется у него в браузере, и вся эта панель ему больше не показывается.</div>
        <button class="btn" onclick="adminSetupLink()">Создать ссылку настройки</button>
      </details>
      <button class="btn" onclick="location.hash='#/admin/new'">＋ Новая запись</button>
      <button class="btn" onclick="adminPreview()">Предпросмотр черновика</button>
      <button class="btn" onclick="adminValidate()">Проверить связи</button>
      <button class="btn" onclick="adminDownload()">Скачать index.html</button>
      <button class="btn" onclick="adminPublish()">✦ Опубликовать</button>
      <button class="btn danger" onclick="draftReset()">Сбросить черновик</button>
      <div id="admin-status"></div>
      <div class="adm-rows" style="margin-top:20px">${rows}</div>
    </div>`;
}

      <div class="hint">Абзацы разделяются пустой строкой; одиночный перенос — для стихов.</div>
      <textarea id="af-body" style="min-height:220px">${esc(blocks(v.body))}</textarea>
      <details class="adm-set" style="margin-top:18px" ${hasExtra?"open":""}>
        <summary>Дополнительно — эпиграф, пометки, связи…</summary>
        <div id="fg-epi">
          <label>Эпиграф — текст</label><textarea id="af-epi" style="min-height:56px">${esc(v.epigraph?v.epigraph.t:"")}</textarea>
          <label>Эпиграф — подпись</label><input id="af-episrc" value="${esc(v.epigraph?v.epigraph.s||"":"")}">
        </div>
        <label>Пометки летописца</label>
        <div class="hint">Каждая пометка — отдельным абзацем через пустую строку.</div>
        <textarea id="af-notes">${esc(blocks(v.notes))}</textarea>
        <div id="fg-versions">
          <label>Редакции летописи</label>
          <div class="hint">Блок: первая строка — тема, дальше — прочтения; блоки через пустую строку.</div>
          <textarea id="af-versions">${esc(versTxt)}</textarea>
        </div>
        <label>Связи</label>
        <div class="hint">По строке: id | подпись. Напр.: jagellona | союзница</div>
        <textarea id="af-links">${esc(linksTxt)}</textarea>
        <label>id записи</label><input id="af-id" value="${esc(v.id)}" ${id?"readonly":""} placeholder="пусто — соберётся из названия сам">
      </details>
      <button class="btn" onclick="adminSaveEntry(${id?`'${id}'`:"null"})">Сохранить в черновик</button>
      ${id ? `<button class="btn danger" onclick="adminDelete('${id}')">Удалить запись</button>` : ""}
      <div id="admin-status"></div>
    </div>`;
  adminFormMode();
}
window.adminFormMode = function(){
  const sec = document.getElementById("af-section").value;
  const c = FORM_CONF[sec] || FORM_CONF.characters;
  const chron = sec === "chronicle";
  const show = (id, on) => { document.getElementById(id).style.display = on ? "" : "none"; };
  show("fg-chron", chron);
  show("fg-years", !!c.years);
  if (c.years){
    document.getElementById("fg-years-label").textContent = c.years[0];
    document.getElementById("af-years").placeholder = c.years[1];
  }
  document.getElementById("fg-sub-label").textContent = c.sub[0];
  document.getElementById("af-sub").placeholder = c.sub[1];
  document.getElementById("fg-image-label").textContent = c.img;
  show("fg-epi", c.epi);
  show("fg-versions", c.vers);
};
function slugify(s){
  const m = {"а":"a","б":"b","в":"v","г":"g","д":"d","е":"e","ё":"e","ж":"zh","з":"z","и":"i","й":"y","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r","с":"s","т":"t","у":"u","ф":"f","х":"h","ц":"ts","ч":"ch","ш":"sh","щ":"sch","ъ":"","ы":"y","ь":"","э":"e","ю":"yu","я":"ya"};
  return s.toLowerCase().split("").map(c => m[c] !== undefined ? m[c] : c).join("")
    .replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0, 40) || "zapis";
}

window.adminUpload = function(inp){
  const f = inp.files && inp.files[0]; if (!f) return;
  const img = new Image();
  img.onload = () => {
    const max = 800, sc = Math.min(1, max / Math.max(img.width, img.height));
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * sc); c.height = Math.round(img.height * sc);
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    const url = c.toDataURL("image/jpeg", .78);
    let key = slugify((f.name || "").replace(/\.[^.]+$/, "")) || "img";
    const taken = k => PUB_IMGS[k] !== undefined || DRAFT.imgs[k] !== undefined;
    if (taken(key)){ const base = key; let n = 2; while (taken(key)) key = base + "-" + (n++); }
    draftInit(); DRAFT.imgs[key] = url; draftSave();
    const sel = document.getElementById("af-image");
    const o = document.createElement("option");
    o.value = key; o.textContent = key + " (новое)"; sel.appendChild(o); sel.value = key;
    document.getElementById("af-imgpreview").innerHTML =
      `<img src="${url}" alt="" style="max-width:120px;border:1px solid var(--gold-dim)">`;
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(f);
};

window.adminSaveEntry = function(origId){
  draftInit();
  const g = i => document.getElementById(i).value;
  const title = g("af-title").trim();
  if (!title) return adminMsg("Дайте записи название.");
  let id = g("af-id").trim();
  if (!id && !origId){
    id = slugify(title);
    let base = id, n = 2;
    while (DRAFT.data.entries.some(x => x.id === id)) id = base + "-" + (n++);
  }
  if (origId) id = origId;
  if (!/^[a-z0-9-]+$/.test(id)) return adminMsg("id: только строчная латиница, цифры и дефис.");
  if (id !== origId && DRAFT.data.entries.some(x => x.id === id)) return adminMsg("Такой id уже занят.");
  const chron = g("af-section") === "chronicle";
  const blocks = s => s.split(/\n\s*\n/).map(x => x.replace(/^\s+|\s+$/g,"")).filter(Boolean);
  const ys = g("af-yearsort").trim();
  const epi = g("af-epi").trim();
  const entry = {
    id, section: g("af-section"),
    title,
    sub: g("af-sub").trim() || null,
    years: chron ? null : (g("af-years").trim() || null),
    yearLabel: chron ? (g("af-yearlabel").trim() || null) : null,
    yearSort: chron ? (ys === "" ? null : (isNaN(+ys) ? null : +ys)) : null,
    image: g("af-image") || null,
    epigraph: epi ? { t: epi, s: g("af-episrc").trim() || null } : null,
    body: blocks(g("af-body")),
    notes: blocks(g("af-notes")),
    versions: blocks(g("af-versions")).map(b => {
      const lines = b.split("\n").map(x => x.trim()).filter(Boolean);
      return { topic: lines[0].replace(/^Тема:\s*/i, ""), readings: lines.slice(1) };
    }).filter(x => x.readings.length),
    links: g("af-links").split("\n").map(x => x.trim()).filter(Boolean).map(x => {
      const i = x.indexOf("|");
      return i >= 0 ? { to: x.slice(0, i).trim(), rel: x.slice(i + 1).trim() } : { to: x, rel: "" };
    }),
    participants: chron ? g("af-participants").split(/[,\s]+/).map(x => x.trim()).filter(Boolean) : []
  };
  const idx = origId ? DRAFT.data.entries.findIndex(x => x.id === origId) : -1;
  if (idx >= 0) DRAFT.data.entries[idx] = entry; else DRAFT.data.entries.push(entry);
  draftSave();
  location.hash = "#/admin";
};

window.adminDelete = function(id){
  if (!confirm("Удалить запись «" + id + "» из черновика?")) return;
  draftInit();
  DRAFT.data.entries = DRAFT.data.entries.filter(x => x.id !== id);
  draftSave();
  location.hash = "#/admin";
};

window.adminValidate = function(){
  draftInit();
  const ids = new Set(DRAFT.data.entries.map(x => x.id));
  const errs = [];
  DRAFT.data.entries.forEach(x => {
    (x.links||[]).forEach(l => { if (!ids.has(l.to)) errs.push(x.id + ": битая связь → " + l.to); });
    (x.participants||[]).forEach(p => { if (!ids.has(p)) errs.push(x.id + ": битый участник → " + p); });
  });
  adminMsg(errs.length ? "Ошибки: " + errs.join("; ") : "✦ Все связи целы (" + DRAFT.data.entries.length + " записей).");
  return errs;
};

/* ── предпросмотр черновика ── */
window.adminPreview = function(){
  draftInit();
  DATA = DRAFT.data;
  IMGS = Object.assign({}, PUB_IMGS, DRAFT.imgs);
  rebuildIndex();
  previewBar(true);
  if (location.hash === "#/" || !location.hash) render(); else location.hash = "#/";
};
window.adminPreviewExit = function(){
  DATA = PUB_DATA; IMGS = PUB_IMGS;
  rebuildIndex();
  previewBar(false);
  if (location.hash === "#/admin") render(); else location.hash = "#/admin";
};
function previewBar(on){
  let b = document.getElementById("preview-bar");
  if (on && !b){
    b = document.createElement("div");
    b.id = "preview-bar";
    b.innerHTML = `<span>✎ Режим предпросмотра: так архив будет выглядеть после публикации</span><button onclick="adminPreviewExit()">Выйти из предпросмотра</button>`;
    document.body.appendChild(b);
  }
  if (!on && b) b.remove();
}

/* ── сборка нового index.html ── */
function adminBuildHTML(src){
  const data = clone(DRAFT.data);
  const merged = Object.assign({}, PUB_IMGS, DRAFT.imgs);
  const used = new Set(data.entries.map(x => x.image));
  const imgs = {};
  for (const k in merged) if (used.has(k)) imgs[k] = merged[k];
  const dj = JSON.stringify(data, null, 1).replace(/<\//g, "<\\/");
  const ij = JSON.stringify(imgs).replace(/<\//g, "<\\/");
  let html = src.replace(/(<script type="application\/json" id="bestiary-data">)[\s\S]*?(<\/script>)/,
    (m, a, b) => a + "\n" + dj + "\n" + b);
  html = html.replace(/(<script type="application\/json" id="bestiary-images">)[\s\S]*?(<\/script>)/,
    (m, a, b) => a + "\n" + ij + "\n" + b);
  return html;
}
function toB64(str){
  const b = new TextEncoder().encode(str);
  let s = ""; const CH = 0x8000;
  for (let i = 0; i < b.length; i += CH) s += String.fromCharCode.apply(null, b.subarray(i, i + CH));
  return btoa(s);
}
function fromB64(b64){
  const bin = atob(b64.replace(/\s/g, ""));
  const b = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(b);
}

/* исходник из самой страницы — для работы с диска без сети */
function adminSelfSource(){
  const root = document.documentElement.cloneNode(true);
  const pb = root.querySelector("#preview-bar"); if (pb) pb.remove();
  const appN = root.querySelector("#app");     if (appN) appN.innerHTML = "";
  const navN = root.querySelector("#topnav");  if (navN) navN.innerHTML = "";
  const adm = root.querySelector("#adm-entry");if (adm) adm.style.display = "none";
  return "<!DOCTYPE html>\n" + root.outerHTML;
}

window.adminDownload = async function(){
  draftInit(); adminCfgSave();
  const errs = adminValidate(); if (errs.length) return;
  let src = null;
  try { const r = await fetch(location.pathname || "index.html", {cache:"no-store"}); if (r.ok) src = await r.text(); } catch(e){}
  if (!src){
    const c = ghRead();
    if (c.owner && c.repo && c.token){
      try {
        const r = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${encodeURIComponent(c.path)}?ref=${c.branch}`,
          { headers: { Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json" } });
        if (r.ok) src = fromB64((await r.json()).content);
      } catch(e){}
    }
  }
  if (!src) src = adminSelfSource();
  const blob = new Blob([adminBuildHTML(src)], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "index.html"; a.click();
  adminMsg("✦ Файл собран — закоммитьте его в репозиторий.");
};

window.adminPublish = async function(){
  draftInit(); adminCfgSave();
  const c = ghRead();
  if (!(c.owner && c.repo && c.token)) return adminMsg("Заполните владельца, репозиторий и токен.");
  const errs = adminValidate(); if (errs.length) return;
  const api = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${encodeURIComponent(c.path)}`;
  const h = { Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json" };
  try {
    adminMsg("Забираю файл из репозитория…");
    const g = await fetch(api + "?ref=" + c.branch, { headers: h });
    if (!g.ok) return adminMsg("GitHub GET: " + g.status + (g.status === 401 ? " — проверьте токен" : g.status === 404 ? " — проверьте owner/repo/путь" : ""));
    const j = await g.json();
    const html = adminBuildHTML(fromB64(j.content));
    adminMsg("Отправляю коммит…");
    const msgEl = document.getElementById("gh-msg");
    const put = await fetch(api, { method: "PUT", headers: h, body: JSON.stringify({
      message: (msgEl && msgEl.value) || "обновление летописей",
      content: toB64(html), sha: j.sha, branch: c.branch
    })});
    if (!put.ok) return adminMsg("GitHub PUT: " + put.status);
    adminMsg("✦ Опубликовано. Pages пересоберётся за минуту-две — обновите страницу позже.");
  } catch(e){ adminMsg("Ошибка сети: " + e.message); }
};

admEntryShow();
render();
</script>
